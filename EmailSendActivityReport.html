<!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║           SECURITY NOTICE — READ BEFORE PUBLISHING                   ║
  ╚══════════════════════════════════════════════════════════════════════╝

  This page queries and renders data from Salesforce Marketing Cloud
  (WSProxy → Send object). It is designed for internal use only.

  Because it is hosted on a public CloudPage URL, anyone who discovers
  or guesses the URL can view send activity data with no authentication.
  Before publishing, add at least one of the protection layers below.

  NOTE: code examples below are shown as plain text (delimiters removed)
  so SFMC does not execute them. Add the appropriate %%[ ]%% or
  <script runat="server"> wrappers when activating an option.

  ──────────────────────────────────────────────────────────────────────
  OPTION 1 — Token check
  ──────────────────────────────────────────────────────────────────────
  Generate a short-lived, single-use token per session and store it in
  a Data Extension (columns: Token | ExpiresAt | SubscriberKey).
  Validate it on every page load before rendering any content.

  Wrap the following in  %%[  ]%%  to activate:

    SET @token = RequestParameter("t")
    SET @tokenRow = LookupRows("TokenDE", "Token", @token)
    IF RowCount(@tokenRow) == 0 THEN
      Redirect("https://www.weforum.org/")
    ENDIF
    SET @tokenData = Row(@tokenRow, 1)
    IF Field(@tokenData, "ExpiresAt") < Now() THEN
      Redirect("https://www.weforum.org/")
    ENDIF

  ──────────────────────────────────────────────────────────────────────
  OPTION 2 — Authenticated (logged-in SFMC) users only
  ──────────────────────────────────────────────────────────────────────
  Use SFMC's built-in CloudPage user validation so only users with an
  active Marketing Cloud session can load the page. Anonymous requests
  are rejected before any page content is rendered.

  Full implementation guide:
  https://sf-marketing.com/marketing-cloud-user-validation-on-cloudpages/

  ──────────────────────────────────────────────────────────────────────
  OPTION 3 — Block direct browser access; allow only MC App context
  ──────────────────────────────────────────────────────────────────────
  Inspect HTTP request headers to verify the request originates from
  inside the SFMC application (known Referer / Origin hosts). Redirect
  any direct browser hit to the public WEF home page.

  NOTE: this approach relies on HTTP headers that browsers may omit or
  spoof. It is best combined with Option 1 or Option 2.

  Wrap the following in  %%[  ]%%  to activate:

    /* Block direct UI access; allow only MC App context */
    IF @isImportRequest == "false" THEN
      SET @ref    = Lowercase(HTTPRequestHeader("Referer"))
      SET @origin = Lowercase(HTTPRequestHeader("Origin"))
      SET @dest   = Lowercase(HTTPRequestHeader("Sec-Fetch-Dest"))
      SET @employeeId = AuthenticatedEmployeeID()
      SET @ok     = "false"

      /* Known Marketing Cloud hosts */
      IF @ok == "false" AND NOT Empty(@ref) THEN
        IF IndexOf(@ref, ".exacttarget.com")       > 0 THEN SET @ok = "true" ENDIF
        IF IndexOf(@ref, ".salesforce.com")         > 0 THEN SET @ok = "true" ENDIF
        IF IndexOf(@ref, ".marketingcloudapps.com") > 0 THEN SET @ok = "true" ENDIF
      ENDIF

      /* Fallback when Referer is absent */
      IF @ok == "false" AND NOT Empty(@origin) THEN
        IF IndexOf(@origin, ".exacttarget.com")       > 0 THEN SET @ok = "true" ENDIF
        IF IndexOf(@origin, ".salesforce.com")         > 0 THEN SET @ok = "true" ENDIF
        IF IndexOf(@origin, ".marketingcloudapps.com") > 0 THEN SET @ok = "true" ENDIF
      ENDIF

      /* Fallback: authenticated employee + iframe destination */
      IF @ok == "false" AND NOT Empty(@employeeId)
                        AND NOT Empty(@dest)
                        AND @dest == "iframe" THEN
        SET @ok = "true"
      ENDIF

      /* If browser exposes a non-iframe destination, always block */
      IF NOT Empty(@dest) AND @dest != "iframe" THEN
        SET @ok = "false"
      ENDIF

      IF @ok == "false" THEN
        Redirect("https://www.weforum.org/")
      ENDIF
    ENDIF

    IF @mode == "1" THEN

  ──────────────────────────────────────────────────────────────────────
  OPTION 4 — OTP (One-Time Password) via Triggered Send + CloudPage
  ──────────────────────────────────────────────────────────────────────
  The user must verify their identity by entering a 4-digit code that
  is emailed to them in real time before the page content is shown.
  This turns the CloudPage into a two-factor gate.

  Full implementation guide:
  https://sfmarketing.cloud/2023/03/09/opt-one-time-password-flow-using-triggered-sends-and-cloudpages/

  ──────────────────────────────────────────────────────────────────────
  OPTION 5 — Hardened HTTP response headers
  ──────────────────────────────────────────────────────────────────────
  Add the following as a  <script runat="server">  block at the very
  top of the page (before any HTML output) to apply security headers
  on every response.

  Reference: https://help.salesforce.com/s/articleView?id=002743057&type=1

  ⚠️  IMPORTANT — X-Frame-Options: DENY prevents the page from being
  embedded in an iframe, including inside the SFMC App itself.
  If the page must run inside SFMC, use SAMEORIGIN instead of DENY.

  Wrap the following in  <script runat="server">  </script>  to activate:

    Platform.Response.SetResponseHeader(
      "Strict-Transport-Security", "max-age=31536000; includeSubDomains");
    Platform.Response.SetResponseHeader(
      "X-XSS-Protection", "1; mode=block");
    Platform.Response.SetResponseHeader(
      "X-Frame-Options", "SAMEORIGIN");
    Platform.Response.SetResponseHeader(
      "X-Content-Type-Options", "nosniff");
    Platform.Response.SetResponseHeader(
      "Referrer-Policy", "strict-origin-when-cross-origin");
    Platform.Response.SetResponseHeader(
      "Content-Security-Policy", "default-src 'self'");


  ══════════════════════════════════════════════════════════════════════

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Send Activity Report – World Economic Forum</title>
  <style>
    /* ── WEF Typeface ─────────────────────────────────────── */
    @font-face {
      font-family: "AkkuratLLWeb";
      src: url("https://www.weforum.org/fonts/Akkurat/AkkuratLLWeb-Regular.woff2") format("woff2"),
           url("https://www.weforum.org/fonts/Akkurat/AkkuratLLWeb-Regular.woff")  format("woff");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    /* ── WEF Design Tokens ─────────────────────────────────── */
    :root {
      --wef-navy:    #1B2B4B;
      --wef-blue:    #0079C2;
      --wef-sky:     #E6F3FB;
      --wef-border:  #D1DAE4;
      --wef-gray:    #F4F6F8;
      --wef-text:    #1B2B4B;
      --wef-muted:   #6B7A8D;
      --wef-warning: #F59E0B;
      --wef-error:   #DC2626;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: AkkuratLLWeb, sans-serif;
      background: var(--wef-gray);
      color: var(--wef-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Global header ─────────────────────────────────────── */
    .wef-header {
      background: var(--wef-navy);
      padding: 0 40px;
      display: flex;
      align-items: center;
      height: 68px;
      gap: 16px;
      border-bottom: 3px solid var(--wef-blue);
    }

    .wef-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      flex-shrink: 0;
    }

    /* WEF official logo */
    .wef-logo svg { width: 81px; height: 50px; }

    .wef-header-tag {
      margin-left: auto;
      color: rgba(255,255,255,.5);
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      border-left: 1px solid rgba(255,255,255,.2);
      padding-left: 20px;
    }

    /* ── Page body wrapper ─────────────────────────────────── */
    .main {
      flex: 1;
      max-width: 1140px;
      width: 100%;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    /* ── Page title ────────────────────────────────────────── */
    .page-title { margin-bottom: 28px; }
    .page-title .accent-bar {
      width: 44px; height: 4px;
      background: var(--wef-blue);
      border-radius: 2px;
      margin-bottom: 12px;
    }
    .page-title h1 {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--wef-navy);
      letter-spacing: -.01em;
    }
    .page-title p {
      font-size: .88rem;
      color: var(--wef-muted);
      margin-top: 5px;
    }

    /* ── Card ──────────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 4px;
      border-top: 3px solid var(--wef-blue);
      box-shadow: 0 1px 8px rgba(27,43,75,.10);
      margin-bottom: 24px;
      padding: 32px 36px;
    }

    /* ── Form ──────────────────────────────────────────────── */
    form { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: .72rem;
      font-weight: 700;
      color: var(--wef-navy);
      text-transform: uppercase;
      letter-spacing: .07em;
    }

    input[type="date"] {
      border: 1.5px solid var(--wef-border);
      border-radius: 3px;
      padding: 10px 14px;
      font-size: .92rem;
      color: var(--wef-text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      min-width: 178px;
      background: #fff;
    }
    input[type="date"]:focus {
      border-color: var(--wef-blue);
      box-shadow: 0 0 0 3px rgba(0,121,194,.14);
    }

    button[type="submit"] {
      background: var(--wef-blue);
      color: #fff;
      border: none;
      border-radius: var(--border-radius-full, 999px);
      border-top-left-radius: 9999px;
      border-top-right-radius: 9999px;
      border-bottom-right-radius: 9999px;
      border-bottom-left-radius: 9999px;
      padding: 10px 30px;
      font-size: .88rem;
      font-weight: 700;
      font-family: AkkuratLLWeb, sans-serif;
      cursor: pointer;
      letter-spacing: .05em;
      text-transform: uppercase;
      transition: background .2s;
      white-space: nowrap;
    }
    button[type="submit"]:hover { background: var(--wef-navy); }

    /* ── Loading overlay ───────────────────────────────────── */
    #loadingOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(27,43,75,.60);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
    }
    #loadingOverlay.active { display: flex; }

    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner-label {
      color: #fff;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    /* ── Messages ──────────────────────────────────────────── */
    .msg {
      padding: 14px 18px;
      border-radius: 3px;
      font-size: .9rem;
      line-height: 1.5;
    }
    .msg.info    { background: var(--wef-sky);   border-left: 4px solid var(--wef-blue);    color: #064E7A; }
    .msg.warning { background: #FFFBEB;           border-left: 4px solid var(--wef-warning); color: #78460A; }
    .msg.error   { background: #FEF2F2;           border-left: 4px solid var(--wef-error);   color: #7F1D1D; }

    /* ── Results header ────────────────────────────────────── */
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .results-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--wef-navy);
    }
    .badge {
      background: var(--wef-blue);
      color: #fff;
      border-radius: 20px;
      padding: 3px 13px;
      font-size: .73rem;
      font-weight: 700;
      letter-spacing: .04em;
    }

    /* ── Table ─────────────────────────────────────────────── */
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }

    thead { background: var(--wef-navy); }
    thead th {
      color: #fff;
      font-weight: 700;
      text-align: left;
      padding: 13px 16px;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid #EEF1F5; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--wef-sky); }
    tbody td { padding: 12px 16px; vertical-align: middle; }

    td.send-id    { font-weight: 700; color: var(--wef-blue); font-size: .83rem; white-space: nowrap; font-family: monospace; }
    td.send-date  { font-family: monospace; font-size: .83rem; color: var(--wef-muted); white-space: nowrap; }
    td.email-name { font-weight: 600; }

    /* ── Footer ────────────────────────────────────────────── */
    .wef-footer {
      background: var(--wef-navy);
      color: rgba(255,255,255,.45);
      text-align: center;
      padding: 18px 20px;
      font-size: .72rem;
      letter-spacing: .05em;
      margin-top: auto;
    }
  </style>
</head>

</div>

<!-- ── Main ─────────────────────────────────────────────── -->
<div class="main">

  <div class="page-title">
    <div class="accent-bar"></div>
    <h1>Email Send Activity Report</h1>
    <p>Query send activities between two dates using SSJS &amp; WSProxy</p>
  </div>

  <div class="card">
    <!--
      Form posts to itself. RequestParameter('PAGEURL') returns the current
      CloudPage URL (standard SFMC AMPscript practice).
      Field values are pre-populated via AMPscript RequestParameter(), which
      correctly reads both GET and POST form fields in SFMC — no SSJS needed
      for that part of the UI.
    -->
    <form method="POST" action="%%=RequestParameter('PAGEURL')=%%" id="searchForm">
      <div class="form-group">
        <label for="startDate">Start Date</label>
        <input type="date" id="startDate" name="startDate"
               value="%%=RequestParameter('startDate')=%%" required />
      </div>
      <div class="form-group">
        <label for="endDate">End Date</label>
        <input type="date" id="endDate" name="endDate"
               value="%%=RequestParameter('endDate')=%%" required />
      </div>
      <button type="submit">Search Sends</button>
    </form>
  </div>

  <!-- SSJS renders the results card below at server render time -->

<script runat="server" language="JavaScript">
Platform.Load("Core", "1.1.5");

/*
 * PURPOSE
 *   Display a date-filtered table of SFMC email send
 *   activities by querying the Send system object via
 *   WSProxy entirely in SSJS.
 *
 * ARCHITECTURE - modular helper functions
 *   errMsg(e)          Safely serialises any thrown value to
 *                      a string. Prevents "undefined" in the
 *                      UI regardless of what WSProxy throws.
 *
 *   getParam(name)     Reads POST form field first (via
 *                      Platform.Request.GetFormField), then
 *                      falls back to the query string.
 *                      Strips dangerous HTML chars. Supports
 *                      both form submission (POST) and
 *                      bookmarkable URLs (GET).
 *
 *   escHtml(str)       HTML-encodes a value before writing
 *                      it to the page, preventing XSS from
 *                      unexpected SendObject field content.
 *
 *   formatDate(raw)    Normalises any SFMC date to YYYY-MM-DD
 *                      for consistent, human-readable output.
 *
 *   isoToMDY(iso)      Converts YYYY-MM-DD to MM/DD/YYYY.
 *                      WSProxy DateValue requires this format;
 *                      the HTML5 date input supplies ISO.
 *
 *   buildFilter(s,e)   Returns a WSProxy SimpleFilterPart
 *                      using the 'between' operator and a
 *                      two-element Value array — the correct
 *                      pattern for date-range filtering on Send.
 *
 *   querySends(filter) Instantiates WSProxy, binds the BU MID
 *                      for security context, calls retrieve(),
 *                      and pages through HasMoreRows using
 *                      getNextBatch(). Returns a plain JS
 *                      array of row objects.
 *
 *   renderMessage(m,t) Writes a styled alert banner.
 *                      Types: info | warning | error.
 *
 *   renderTable(r,s,e) Writes the results card with summary
 *                      header and a table: SendID, EmailName,
 *                      SendDate (YYYY-MM-DD), Subject.
 *
 * KEY TECHNICAL DECISIONS
 *   - WSProxy ONLY. No AMPscript for data retrieval.
 *     No deprecated SOAP API calls.
 *   - Platform.Request.GetFormField(name) is the correct
 *     SFMC SSJS method for reading individual POST form
 *     fields. GetPostData() returns the raw POST body
 *     string and does not accept a field name argument.
 *   - setClientId(MID) is required on public CloudPages
 *     so WSProxy has a valid security context. Without it
 *     SFMC throws "Unable to retrieve security descriptor".
 *   - Date format: HTML5 input -> YYYY-MM-DD. isoToMDY()
 *     converts to MM/DD/YYYY for the WSProxy DateValue.
 *     formatDate() converts raw SFMC dates back to YYYY-MM-DD.
 *   - 'between' operator with Value:[start,end] is simpler
 *     and more reliable for date ranges on the Send object.
 *   - Pagination uses getNextBatch('Send', requestId) —
 *     the correct WSProxy paging API. The RequestID from
 *     the initial retrieve() must be passed to every
 *     subsequent batch call. getNextPage() is not a valid
 *     WSProxy method.
 *   - No dates are hardcoded. Both boundaries come solely
 *     from user input at runtime.
 * =========================================================
 */

/* 1. Safely convert any thrown value to a string */
function errMsg(e) {
  if (!e)                    return 'Unknown error';
  if (typeof e === 'string') return e;
  if (e.message)             return String(e.message);
  try { return Stringify(e); } catch (x) { return 'Unknown error'; }
}

/* 2. Read POST form field, then fall back to query string; strip HTML chars */
function getParam(name) {
  try {
    var v = Platform.Request.GetFormField(name);
    if (!v || v === '') v = Platform.Request.GetQueryStringParameter(name);
    return v ? String(v).replace(/[<>'"]/g, '') : '';
  } catch (e) { return ''; }
}

/* 3. HTML-encode a value before writing it to the page (XSS prevention) */
function escHtml(str) {
  return String(str)
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;');
}

/* 4. Normalise any date string to YYYY-MM-DD for display */
function formatDate(raw) {
  try {
    if (!raw) return '';
    var d = new Date(raw);
    if (isNaN(d.getTime())) return String(raw);
    var yyyy = d.getFullYear();
    var mm   = ('0' + (d.getMonth() + 1)).slice(-2);
    var dd   = ('0' + d.getDate()).slice(-2);
    return yyyy + '-' + mm + '-' + dd;
  } catch (e) { return String(raw); }
}

/* 5. Convert YYYY-MM-DD to MM/DD/YYYY for WSProxy DateValue */
function isoToMDY(iso) {
  var p = iso.split('-');
  if (p.length !== 3) return iso;
  return p[1] + '/' + p[2] + '/' + p[0];
}

/* 6. Build a WSProxy 'between' filter for SendDate */
function buildFilter(startDate, endDate) {
  return {
    Property:       'SendDate',
    SimpleOperator: 'between',
    Value: [isoToMDY(startDate), isoToMDY(endDate)]
  };
}

/* 7. Retrieve Send records via WSProxy with correct paging via getNextBatch */
function querySends(filter) {
  var prox = new Script.Util.WSProxy();

  /* Bind BU MID - required for security context on public CloudPages */
  var mid = Platform.Function.AuthenticatedMemberID();
  prox.setClientId({ 'ID': mid });

  var cols      = ['ID', 'EmailName', 'SendDate', 'Subject'];
  var rows      = [];
  var result    = prox.retrieve('Send', cols, filter);
  var requestId = result ? result.RequestID : null;

  /* WSProxy signals errors via result.Status, not thrown exceptions */
  if (!result || result.Status === 'Error') {
    throw (result && result.message)
      ? result.message
      : 'WSProxy retrieve call failed.';
  }

  if (result.Results) {
    for (var i = 0; i < result.Results.length; i++) {
      var r = result.Results[i];
      rows.push({
        SendID:    r.ID        ? String(r.ID)        : '',
        EmailName: r.EmailName ? String(r.EmailName) : '(no name)',
        SendDate:  formatDate(r.SendDate),
        Subject:   r.Subject   ? String(r.Subject)   : '(no subject)'
      });
    }

    /*
     * Page through additional result sets.
     * getNextBatch(objectType, requestId) is the correct WSProxy paging
     * method — getNextPage() does not exist in the SFMC WSProxy API.
     */
    while (result.HasMoreRows) {
      result = prox.getNextBatch('Send', requestId);
      if (!result || result.Status === 'Error') break;
      if (result.Results) {
        for (var j = 0; j < result.Results.length; j++) {
          var s = result.Results[j];
          rows.push({
            SendID:    s.ID        ? String(s.ID)        : '',
            EmailName: s.EmailName ? String(s.EmailName) : '(no name)',
            SendDate:  formatDate(s.SendDate),
            Subject:   s.Subject   ? String(s.Subject)   : '(no subject)'
          });
        }
      }
    }
  }

  return rows;
}

/* 8. Write a styled alert banner (info | warning | error) */
function renderMessage(msg, type) {
  Write('<div class="msg ' + (type || 'info') + '">' + msg + '</div>');
}

/* 9. Write the results card and HTML table */
function renderTable(rows, startDate, endDate) {
  Write('<div class="card">');
  Write('<div class="results-header">');
  Write('<h2>Results: ' + startDate + ' &ndash; ' + endDate + '</h2>');
  Write('<span class="badge">' + rows.length
        + ' send' + (rows.length !== 1 ? 's' : '') + '</span>');
  Write('</div>');

  if (rows.length === 0) {
    renderMessage('No send activities found for the selected date range.', 'warning');
    Write('</div>');
    return;
  }

  Write('<div class="table-wrapper"><table>');
  Write('<thead><tr>');
  Write('<th>Send ID</th>');
  Write('<th>Email Name</th>');
  Write('<th>Send Date</th>');
  Write('<th>Subject</th>');
  Write('</tr></thead>');
  Write('<tbody>');

  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    Write('<tr>');
    Write('<td class="send-id">'    + escHtml(row.SendID)    + '</td>');
    Write('<td class="email-name">' + escHtml(row.EmailName) + '</td>');
    Write('<td class="send-date">'  + escHtml(row.SendDate)  + '</td>');
    Write('<td class="subject">'    + escHtml(row.Subject)   + '</td>');
    Write('</tr>');
  }

  Write('</tbody></table></div>');
  Write('</div>');
}

/* ── MAIN ── read params, validate, query, render ──────── */
try {
  var startDate = getParam('startDate');
  var endDate   = getParam('endDate');

  if (!startDate && !endDate) {
    /* Initial page load — no dates submitted yet */
    Write('<div class="card">');
    renderMessage(
      'Select a <strong>start date</strong> and <strong>end date</strong> above, '
      + 'then click <strong>Search Sends</strong> to retrieve email send activities.',
      'info'
    );
    Write('</div>');

  } else if (!startDate || !endDate) {
    /* Only one date supplied */
    Write('<div class="card">');
    renderMessage(
      'Both a start date and an end date are required. Please fill in both fields.',
      'warning'
    );
    Write('</div>');

  } else if (startDate > endDate) {
    /* Start is chronologically after end */
    Write('<div class="card">');
    renderMessage(
      'The start date must be on or before the end date. Please correct your selection.',
      'warning'
    );
    Write('</div>');

  } else {
    /* Happy path: build filter, query WSProxy, render table */
    var filter = buildFilter(startDate, endDate);
    var rows   = querySends(filter);
    renderTable(rows, startDate, endDate);
  }

} catch (ex) {
  /* Outer catch-all: surface any runtime or WSProxy error */
  Write('<div class="card">');
  renderMessage('<strong>Error:</strong> ' + errMsg(ex), 'error');
  Write('</div>');
}
</script>
